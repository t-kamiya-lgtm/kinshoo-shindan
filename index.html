<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>金賞の一膳｜タイプ診断</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet" onerror="this.remove()">
<style>
:root {
  --cream:#FDF8F2; --gold:#C9A84C; --gold-light:#E8C97A; --gold-dark:#9A7A30;
  --sakura:#F2C4CE; --sakura-deep:#D9849A;
  --deep-brown:#3D2B1F; --text-body:#4A3728; --text-light:#8B7060;
  --shadow-warm:rgba(61,43,31,0.12); --shadow-gold:rgba(201,168,76,0.25);
  --green-deep:#4A7C59; --radius:20px; --radius-sm:12px;
  --font-serif:'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif;
  --font-sans:'Noto Sans JP','Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;min-height:100vh;background:var(--cream);font-family:var(--font-sans);color:var(--text-body);overflow-x:hidden;}
.screen{display:none;min-height:100vh;padding:0 0 40px;animation:fadeUp 0.5s ease both;}
.screen.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
#screen-top{background:linear-gradient(160deg,#FDF6EC 0%,#FEF0F4 60%,#FDF8F2 100%);position:relative;overflow:hidden;}
.top-petal-bg{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;overflow:hidden;}
.petal{position:absolute;opacity:0.18;animation:petalFloat linear infinite;}
@keyframes petalFloat{0%{transform:translateY(-40px) rotate(0deg);opacity:0;}10%{opacity:0.18;}90%{opacity:0.18;}100%{transform:translateY(110vh) rotate(360deg);opacity:0;}}
.top-header{text-align:center;padding:52px 24px 24px;position:relative;z-index:2;}
.brand-badge{display:inline-block;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#fff;font-size:10px;letter-spacing:0.15em;padding:5px 14px;border-radius:30px;font-family:var(--font-serif);margin-bottom:16px;box-shadow:0 3px 12px var(--shadow-gold);}
.top-title{font-family:var(--font-serif);font-size:28px;font-weight:700;color:var(--deep-brown);line-height:1.4;letter-spacing:0.04em;margin-bottom:8px;}
.top-title span{color:var(--gold-dark);}
.top-subtitle{font-size:13px;color:var(--text-light);letter-spacing:0.06em;line-height:1.7;}
.top-card{margin:20px 20px 0;background:rgba(255,255,255,0.82);backdrop-filter:blur(10px);border-radius:var(--radius);padding:24px 20px;box-shadow:0 8px 32px var(--shadow-warm),0 0 0 1px rgba(201,168,76,0.15);position:relative;z-index:2;}
.top-card-lead{font-size:14px;color:var(--text-body);line-height:1.85;margin-bottom:20px;text-align:center;}
.top-card-lead strong{color:var(--gold-dark);font-weight:600;}
.diagnose-choices{display:flex;flex-direction:column;gap:14px;}
.diagnose-btn{width:100%;border:none;cursor:pointer;border-radius:var(--radius-sm);padding:20px 18px;text-align:left;position:relative;overflow:hidden;transition:transform 0.18s;}
.diagnose-btn:active{transform:scale(0.97);}
.diagnose-btn.cinderella{background:linear-gradient(135deg,#FEF0F4,#FDDEE6);border:1.5px solid rgba(217,132,154,0.35);box-shadow:0 4px 18px rgba(217,132,154,0.18);}
.diagnose-btn.manager{background:linear-gradient(135deg,#F0F7F1,#D9EDD9);border:1.5px solid rgba(124,174,122,0.35);box-shadow:0 4px 18px rgba(124,174,122,0.18);}
.btn-num{font-size:10px;font-weight:600;letter-spacing:0.1em;margin-bottom:5px;}
.cinderella .btn-num{color:var(--sakura-deep);}.manager .btn-num{color:var(--green-deep);}
.btn-title{font-family:var(--font-serif);font-size:16px;font-weight:700;color:var(--deep-brown);line-height:1.45;margin-bottom:6px;}
.btn-desc{font-size:11.5px;color:var(--text-light);line-height:1.65;}
.btn-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:30px;opacity:0.55;}
.btn-arrow{position:absolute;right:14px;bottom:14px;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;}
.cinderella .btn-arrow{background:var(--sakura-deep);color:#fff;}.manager .btn-arrow{background:var(--green-deep);color:#fff;}
#screen-cinderella{background:linear-gradient(170deg,#FDF8F2,#FEF4F7);}
#screen-manager{background:linear-gradient(170deg,#F8FDF8,#EDF7EE);}
.q-header{padding:36px 24px 20px;text-align:center;position:relative;}
.q-back-btn{position:absolute;left:18px;top:36px;background:rgba(255,255,255,0.7);border:1px solid rgba(0,0,0,0.1);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;box-shadow:0 2px 8px var(--shadow-warm);}
.q-back-btn:active{transform:scale(0.92);}
.q-type-badge{display:inline-block;font-size:10px;letter-spacing:0.12em;padding:4px 12px;border-radius:30px;margin-bottom:10px;font-weight:600;}
.cinderella-color .q-type-badge{background:#FDDEE6;color:var(--sakura-deep);}
.manager-color .q-type-badge{background:#D9EDD9;color:var(--green-deep);}
.q-title{font-family:var(--font-serif);font-size:18px;font-weight:700;color:var(--deep-brown);line-height:1.45;}
.progress-wrap{padding:0 24px 20px;display:flex;flex-direction:column;gap:6px;}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text-light);}
.progress-bar{width:100%;height:6px;background:rgba(0,0,0,0.07);border-radius:10px;overflow:hidden;}
.progress-fill{height:100%;border-radius:10px;transition:width 0.5s cubic-bezier(0.34,1.56,0.64,1);}
.cinderella-color .progress-fill{background:linear-gradient(90deg,var(--sakura),var(--sakura-deep));}
.manager-color .progress-fill{background:linear-gradient(90deg,#A8D4A8,var(--green-deep));}
.q-card{margin:0 20px;background:#fff;border-radius:var(--radius);padding:26px 22px 22px;box-shadow:0 6px 28px var(--shadow-warm);}
.q-number{font-size:11px;font-weight:700;letter-spacing:0.12em;margin-bottom:12px;}
.cinderella-color .q-number{color:var(--sakura-deep);}.manager-color .q-number{color:var(--green-deep);}
.q-text{font-family:var(--font-serif);font-size:17px;font-weight:600;color:var(--deep-brown);line-height:1.7;margin-bottom:22px;}
.answer-btns{display:flex;flex-direction:column;gap:12px;}
.answer-btn{border:none;cursor:pointer;border-radius:var(--radius-sm);padding:18px 18px 16px;text-align:left;font-family:var(--font-sans);transition:transform 0.15s;width:100%;}
.answer-btn:active{transform:scale(0.97);}
.cinderella-color .answer-btn{background:linear-gradient(135deg,#FFF8FA,#FEF1F5);border:1.5px solid rgba(217,132,154,0.25);box-shadow:0 3px 12px rgba(217,132,154,0.12);}
.manager-color .answer-btn{background:linear-gradient(135deg,#F5FBF5,#EAF5EB);border:1.5px solid rgba(124,174,122,0.25);box-shadow:0 3px 12px rgba(124,174,122,0.12);}
.answer-letter{display:inline-block;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:700;text-align:center;line-height:22px;margin-bottom:8px;}
.cinderella-color .answer-letter{background:var(--sakura-deep);color:#fff;}
.manager-color .answer-letter{background:var(--green-deep);color:#fff;}
.answer-text{font-size:13.5px;color:var(--text-body);line-height:1.75;}
#screen-result{background:linear-gradient(160deg,#FDF8F2,#FEF4EC 50%,#FDF2F6);padding-bottom:60px;}
.result-header{padding:44px 24px 20px;text-align:center;}
.result-badge{display:inline-block;font-size:10px;letter-spacing:0.15em;padding:4px 14px;border-radius:30px;margin-bottom:14px;font-weight:600;}
.cinderella-badge{background:#FDDEE6;color:var(--sakura-deep);}
.manager-badge{background:#D9EDD9;color:var(--green-deep);}
.result-type-tag{display:inline-block;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#fff;font-size:11px;letter-spacing:0.1em;padding:5px 16px;border-radius:30px;font-weight:700;margin-bottom:14px;box-shadow:0 3px 14px var(--shadow-gold);}
.result-name{font-family:var(--font-serif);font-size:24px;font-weight:700;color:var(--deep-brown);line-height:1.4;margin-bottom:6px;}
.result-sub{font-size:13px;color:var(--text-light);line-height:1.7;}
.result-card{margin:8px 20px 0;background:#fff;border-radius:var(--radius);overflow:hidden;box-shadow:0 8px 32px var(--shadow-warm);}
.result-big-emoji{font-size:64px;display:block;margin-bottom:12px;animation:emojiPop 0.6s cubic-bezier(0.34,1.56,0.64,1) both;text-align:center;padding-top:28px;}
@keyframes emojiPop{from{transform:scale(0.2);opacity:0;}to{transform:scale(1);opacity:1;}}
.result-desc{font-size:14px;color:var(--text-body);line-height:1.85;text-align:left;padding:12px 24px 22px;}
.card-gap{height:14px;}
.product-rec{margin:0 20px;background:#fff;border-radius:var(--radius);padding:22px 22px 20px;box-shadow:0 4px 20px var(--shadow-warm);}
.product-rec-label{font-size:10px;letter-spacing:0.15em;color:var(--gold-dark);font-weight:700;margin-bottom:12px;text-align:center;}
.prod-img-wrap{text-align:center;margin-bottom:12px;}
.prod-img-wrap img{width:90px;height:90px;object-fit:cover;border-radius:50%;box-shadow:0 4px 16px rgba(61,43,31,0.22),0 0 0 3px rgba(201,168,76,0.35);transition:transform 0.3s;}
.product-rec-title{font-family:var(--font-serif);font-size:18px;font-weight:700;color:var(--deep-brown);text-align:center;margin-bottom:10px;line-height:1.5;}
.product-rec-desc{font-size:13px;color:var(--text-light);text-align:center;line-height:1.8;margin-bottom:18px;}
.trait-pills{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:18px;}
.trait-pill{font-size:11.5px;padding:5px 12px;border-radius:30px;font-weight:500;}
.trait-pill.gold{background:#FEF5E2;color:var(--gold-dark);border:1px solid rgba(201,168,76,0.3);}
.trait-pill.pink{background:#FEF0F4;color:var(--sakura-deep);border:1px solid rgba(217,132,154,0.3);}
.trait-pill.green{background:#EDF7EE;color:var(--green-deep);border:1px solid rgba(124,174,122,0.3);}
.cta-btn{width:100%;border:none;cursor:pointer;background:linear-gradient(135deg,var(--gold-dark),var(--gold),var(--gold-light));color:#fff;font-family:var(--font-serif);font-size:16px;font-weight:700;padding:18px 24px;border-radius:var(--radius-sm);letter-spacing:0.06em;box-shadow:0 6px 22px var(--shadow-gold);transition:transform 0.15s;position:relative;overflow:hidden;}
.cta-btn::after{content:'';position:absolute;top:-50%;left:-60%;width:40%;height:200%;background:rgba(255,255,255,0.2);transform:skewX(-20deg);animation:shine 3s infinite 1s;}
@keyframes shine{0%{left:-60%;}50%,100%{left:130%;}}
.cta-btn:active{transform:scale(0.97);}
.retry-btn{display:block;width:calc(100% - 40px);margin:14px 20px 0;border:1.5px solid rgba(201,168,76,0.4);background:transparent;cursor:pointer;color:var(--gold-dark);font-size:13.5px;font-weight:500;padding:14px;border-radius:var(--radius-sm);letter-spacing:0.05em;}
.retry-btn:active{background:rgba(201,168,76,0.08);}
#loading-overlay{display:none;position:fixed;inset:0;z-index:999;background:rgba(253,248,242,0.92);backdrop-filter:blur(8px);flex-direction:column;align-items:center;justify-content:center;gap:18px;}
#loading-overlay.show{display:flex;}
.loading-ring{width:52px;height:52px;border:3px solid rgba(201,168,76,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-family:var(--font-serif);font-size:14px;color:var(--text-light);letter-spacing:0.08em;}
</style>
</head>
<body>
<div id="loading-overlay">
  <div class="loading-ring"></div>
  <p class="loading-text">あなたのタイプを診断中…</p>
</div>
<div id="screen-top" class="screen active">
  <div class="top-petal-bg" id="petal-container"></div>
  <div class="top-header">
    <div class="brand-badge">金賞の一膳 × タイプ診断</div>
    <h1 class="top-title">あなたに合った<br><span>賢い手抜き</span>、<br>見つけませんか？</h1>
    <p class="top-subtitle">忙しい毎日を丁寧に生きるための<br>ちょっとした戦略があります。</p>
  </div>
  <div class="top-card">
    <p class="top-card-lead">「一晩浸水、また忘れた…」<br>「ご飯パックって手抜きかな…」<br><br><strong>大丈夫。それはズボラじゃなくて、あなたの性格に合わせた合理的な選択です。</strong><br><br>2つの診断から、あなたにぴったりな方を選んでください。</p>
    <div class="diagnose-choices">
      <button class="diagnose-btn cinderella" id="btn-cinderella">
        <div class="btn-num">DIAGNOSIS 01</div>
        <div class="btn-title">ズボラ・シンデレラ<br>診断</div>
        <div class="btn-desc">理想と現実のギャップに悩む<br>あなたは、16タイプの何シンデレラ？</div>
        <div class="btn-icon">👸</div>
        <div class="btn-arrow">→</div>
      </button>
      <button class="diagnose-btn manager" id="btn-manager">
        <div class="btn-num">DIAGNOSIS 02</div>
        <div class="btn-title">ご自愛マネジメント<br>診断</div>
        <div class="btn-desc">「手抜き」を「家庭運営の効率化」へ。<br>あなたのマネジメントタイプは？</div>
        <div class="btn-icon">💼</div>
        <div class="btn-arrow">→</div>
      </button>
    </div>
  </div>
</div>
<div id="screen-cinderella" class="screen cinderella-color">
  <div class="q-header">
    <button class="q-back-btn" id="c-back">←</button>
    <div class="q-type-badge">ズボラ・シンデレラ診断</div>
    <h2 class="q-title">あなたはどのシンデレラ？</h2>
  </div>
  <div class="progress-wrap">
    <div class="progress-label"><span id="c-q-label">Q1 / 3</span><span id="c-q-pct">33%</span></div>
    <div class="progress-bar"><div class="progress-fill" id="c-progress" style="width:33%"></div></div>
  </div>
  <div id="c-q-area"></div>
</div>
<div id="screen-manager" class="screen manager-color">
  <div class="q-header">
    <button class="q-back-btn" id="m-back">←</button>
    <div class="q-type-badge">ご自愛マネジメント診断</div>
    <h2 class="q-title">あなたのマネジメントタイプは？</h2>
  </div>
  <div class="progress-wrap">
    <div class="progress-label"><span id="m-q-label">Q1 / 3</span><span id="m-q-pct">33%</span></div>
    <div class="progress-bar"><div class="progress-fill" id="m-progress" style="width:33%"></div></div>
  </div>
  <div id="m-q-area"></div>
</div>
<div id="screen-result" class="screen">
  <div class="result-header">
    <div id="r-type-badge" class="result-badge"></div><br>
    <div id="r-mbti-tag" class="result-type-tag"></div>
    <div id="r-name" class="result-name"></div>
    <div id="r-sub" class="result-sub"></div>
  </div>
  <div class="result-card">
    <span id="r-emoji" class="result-big-emoji"></span>
    <p id="r-desc" class="result-desc"></p>
  </div>
  <div class="card-gap"></div>
  <div class="product-rec">
    <div class="product-rec-label">✦ あなたへのおすすめ ✦</div>
    <div class="prod-img-wrap"><img id="r-prod-img" src="" alt=""></div>
    <div id="r-prod-title" class="product-rec-title"></div>
    <div id="r-prod-desc" class="product-rec-desc"></div>
    <div id="r-traits" class="trait-pills"></div>
    <button class="cta-btn" id="cta-btn">商品はこちら →</button>
  </div>
  <button class="retry-btn" id="retry-btn">🔄 もう一度診断する</button>
</div>
<script>
const productImages = {
  "金賞健康米×金のいぶき（玄米）": "https://cdn.shopify.com/s/files/1/0797/7015/7279/files/29772005_sku.jpg?v=1773834482",
  "金賞健康米×きらりもち（もち麦）": "https://cdn.shopify.com/s/files/1/0797/7015/7279/files/2977200112_sku.jpg?v=1773827159",
  "金賞健康米×黒米・玄米": "https://cdn.shopify.com/s/files/1/0797/7015/7279/files/29772004_sku.jpg?v=1773832868",
  "金賞健康米×十六雑穀": "https://cdn.shopify.com/s/files/1/0797/7015/7279/files/2977200212_sku.jpg?v=1773829775",
  "金賞の一膳の赤飯": "https://cdn.shopify.com/s/files/1/0797/7015/7279/files/f4d7deabb0758c4f2a79add6e21eb427_219d27cb-5379-443e-9ab7-99219d47291d.jpg?v=1773835635",
  "5種アソートセット": "https://cdn.shopify.com/s/files/1/0797/7015/7279/files/29772005_sku.jpg?v=1773834482",
};

var productUrls = {
  "金賞健康米×金のいぶき（玄米）":   "https://kotokoto-kurashi.com/collections/kinsho-ichizen/products/kinsho-no-ichizen-kinnoibuki-12p",
  "金賞健康米×きらりもち（もち麦）": "https://kotokoto-kurashi.com/collections/kinsho-ichizen/products/kinsho-no-ichizen-kirarimochi-12p",
  "金賞健康米×黒米・玄米":           "https://kotokoto-kurashi.com/collections/kinsho-ichizen/products/kinsho-no-ichizen-kokumai-12p",
  "金賞健康米×十六雑穀":            "https://kotokoto-kurashi.com/collections/kinsho-ichizen/products/kinsho-no-ichizen-jurokuzakkoku-12p",
  "金賞の一膳の赤飯":               "https://kotokoto-kurashi.com/collections/kinsho-ichizen/products/kinsho-no-ichizen-sekihan-12p",
  "5種アソートセット":              "https://kotokoto-kurashi.com/collections/kinsho-ichizen/products/kinsho-no-ichizen-zeitaku5syu-12p"
};
var cinderellaQ=[{q:"Q1. キッチンに立つあなたの\n正直な気持ちは？",a:["理想は「丁寧な暮らし」。\n現実は「秒で終わらせたい」。","栄養は大事。でも「一晩浸水」と\n聞くだけで白目になる。"]},{q:"Q2. もしも魔法が使えるなら、\n何を消したい？",a:["食後の山のような洗い物と、\n献立を考える時間。","食べすぎた後の罪悪感。"]},{q:"Q3. 夕方に一番焦る理由は？",a:["冷蔵庫が空、かつお米を\n炊く時間もない。","自分の美容や健康に、\n今日一日何も投資できていない。"]}];
var managerQ=[{q:"Q1. あなたの理想の\n家庭運営スタイルは？",a:["無駄を削り、パフォーマンスを\n最大化する「ROI重視型」。","チーム（家族）のコンディションを\n整える「ウェルビーイング型」。"]},{q:"Q2. 今、最も優先して\n投資したいリソースは？",a:["自分のメンタルケアと、\n仕事に集中するためのエネルギー。","内側からのデトックスと、\n年齢に負けない土台作り。"]},{q:"Q3. 「ご飯パック」を使う決断を\nした時、その理由は？",a:["戦略的時短。浮いた時間で\n自分をアップデートするため。","質の高い栄養を確実に摂取するため。\nサボりではなく「管理」。"]}];
var cinderellaTypes={"000":{mbti:"ENTJ",name:"完璧主義シンデレラ",sub:"段取りの女王、でも魔法も使う",emoji:"👑",desc:"理想は高く、効率重視のあなた。「丁寧な暮らし」への憧れは本物なのに、スピードへの本能がそれを邪魔します。でもそれって、全力で人生を生きている証拠。魔法のパックで時短しながら、浮いた時間を「本当にやりたいこと」に使うのが、あなたらしい選択です。",prod:"金賞健康米×金のいぶき（玄米）",prodDesc:"最短で最高の結果を出す戦略家に。\n発芽玄米の栄養価を、パックの手軽さで。",traits:["ROI重視","段取り上手","完璧主義"]},"001":{mbti:"ENFJ",name:"みんなのためシンデレラ",sub:"家族想いの魔法使い",emoji:"🌸",desc:"家族のために頑張りすぎて、自分のケアを後回しにしてしまうあなた。その優しさは本物。でも、自分が健康でなければ誰も幸せにできません。美容と健康を手軽にケアできるパックは、「家族のため」と「自分のため」を同時に叶える魔法です。",prod:"金賞健康米×十六雑穀",prodDesc:"16種類の雑穀で、家族全員の栄養を\nしっかりサポート。",traits:["家族第一","思いやり","献身的"]},"010":{mbti:"INTJ",name:"戦略家シンデレラ",sub:"データで動く静かな革命家",emoji:"🔮",desc:"感情より論理、直感より計画。あなたの「手抜き」には、実は緻密な戦略が隠れています。栄養成分表を読み比べ、コスパを計算してから選ぶ。そんなあなたに、機能性と利便性を兼ね備えた選択肢を。",prod:"金賞健康米×黒米・玄米",prodDesc:"アントシアニン＋食物繊維の\n機能性コンビ。データが証明する美味しさ。",traits:["論理的","計画派","戦略家"]},"011":{mbti:"INFJ",name:"理想追求シンデレラ",sub:"美と健康の哲学者",emoji:"✨",desc:"内なる美意識が高く、「本当に良いもの」だけを選びたいあなた。ご飯パックに罪悪感を感じるのは、それだけ食への意識が高い証拠。でも、時短と品質は両立できます。あなたの直感を信じて。",prod:"5種アソートセット",prodDesc:"5種類から、今日の自分に\n一番合うものを選ぶ贅沢。",traits:["美意識高い","直感的","哲学派"]},"100":{mbti:"ESTP",name:"チャレンジャーシンデレラ",sub:"行動力抜群の現実主義者",emoji:"⚡",desc:"考えるより先に動く、エネルギッシュなあなた。浸水を忘れるのも、献立を考えるのが面倒なのも、それだけ行動量が多い証拠。パックで時短した分、もっと外の世界で輝いてください。",prod:"金賞健康米×きらりもち（もち麦）",prodDesc:"食物繊維でお腹すっきり。\n動き続けるあなたの腸内環境をサポート。",traits:["行動力","現実主義","エネルギッシュ"]},"101":{mbti:"ESFP",name:"享楽主義シンデレラ",sub:"今この瞬間を全力で楽しむ人",emoji:"🎀",desc:"毎日を楽しむことへの才能があるあなた。「美味しい！」が一番の栄養。でも体の内側からのケアも忘れずに。美容と健康をキープしながら、毎日を謳歌する選択を。",prod:"金賞の一膳の赤飯",prodDesc:"晴れやかな日常に。特別な一杯で\n自分をご褒美。もちろん手軽に。",traits:["楽天的","今を楽しむ","社交的"]},"110":{mbti:"ISTP",name:"実用主義シンデレラ",sub:"無駄を嫌う職人気質",emoji:"🔧",desc:"理屈よりも実用性。シンプルに「使えるかどうか」で判断するあなたにとって、パックは完璧なソリューション。試してみたら良かった、で十分です。難しい話は抜きで。",prod:"金賞健康米×金のいぶき（玄米）",prodDesc:"シンプルに美味しく、栄養も確か。\n余計なものは要らない、あなたへ。",traits:["実用重視","シンプリスト","職人気質"]},"111":{mbti:"INFP",name:"夢見がちシンデレラ",sub:"理想は高いが浸水を忘れるタイプ",emoji:"🌙",desc:"「いつかは丁寧な暮らしを…」と思いながら、また今日も浸水を忘れたあなたへ。大丈夫です。夢見る気持ちを持ちながら、現実とうまく折り合いをつけることが、本当の賢さ。十六雑穀が、あなたの理想の食卓に魔法をかけます。",prod:"金賞健康米×十六雑穀",prodDesc:"「いつか丁寧に」の夢を叶える魔法。\n16種の恵みを、今すぐ、手軽に。",traits:["夢想家","感受性豊か","理想高め"]}};
var managerTypes={"000":{mbti:"ENTJ",name:"生産性極大化マネージャー",sub:"最短で最高の結果を出す戦略家",emoji:"📈",desc:"時間をコストと捉え、ROIで全てを判断するあなた。ご飯パックを使う決断は、単なる「手抜き」ではなく、限りある時間資源を最適配分した経営判断です。浮いた時間で、自分というビジネスをアップデートしてください。",prod:"金賞健康米×金のいぶき（玄米）",prodDesc:"発芽玄米のGABA・食物繊維で\n脳のパフォーマンスを最大化。",traits:["ROI重視","タイムマネジメント","結果重視"]},"001":{mbti:"ENFJ",name:"チーム育成マネージャー",sub:"家族の健康を設計するCHO",emoji:"🌿",desc:"家族全員のコンディションを把握し、最適な環境を整えるあなたは、まさに家庭のCHO（チーフ・ヘルス・オフィサー）。チームの栄養管理に雑穀パックを導入することは、最高の福利厚生投資です。",prod:"金賞健康米×十六雑穀",prodDesc:"16種の栄養で、家族全員の\nウェルビーイングを底上げ。",traits:["チーム重視","育成型","ウェルビーイング"]},"010":{mbti:"INTJ",name:"データ駆動型マネージャー",sub:"数字で健康を管理する知性派",emoji:"💡",desc:"感覚より根拠、流行より実績。栄養成分を調べ、費用対効果を計算してから選ぶあなたには、機能性が明確な商品こそ「正しい投資」。戦略的摂取で、年齢に負けない基盤を構築してください。",prod:"金賞健康米×黒米・玄米",prodDesc:"アントシアニン・GABA・食物繊維。\n成分ロジックが明快な、知性派の選択。",traits:["データ重視","論理的","長期思考"]},"011":{mbti:"INFJ",name:"ビジョン型マネージャー",sub:"10年後の自分を設計する先見者",emoji:"🔭",desc:"「今の選択が未来をつくる」という確信を持つあなた。食事の質へのこだわりは、それ自体が長期的な自己投資です。毎日の食卓を、未来の自分への「積み立て」として位置づけてみてください。",prod:"5種アソートセット",prodDesc:"5種類をローテーション。\n飽きずに続けられる長期投資型。",traits:["ビジョン重視","長期投資","こだわり派"]},"100":{mbti:"ESTP",name:"スピード重視マネージャー",sub:"瞬時の判断で動く実行者",emoji:"⚡",desc:"考えすぎず、まずやってみる。あなたの強みはスピードと行動力です。ご飯パックは、そのスピード感に完璧にマッチした「高速実行ツール」。時短で生まれた時間を、次のアクションへの燃料にしてください。",prod:"金賞健康米×きらりもち（もち麦）",prodDesc:"腸活でコンディションを整え、\nフル稼働できる体をキープ。",traits:["スピード重視","即断即決","行動力"]},"101":{mbti:"ESFP",name:"エンゲージメント型マネージャー",sub:"チームの空気を明るくする太陽",emoji:"☀️",desc:"職場でも家庭でも、あなたがいると場が和む。その明るさを維持するためには、自分自身のエネルギーを補充することが最優先です。美味しく、楽しく、健康管理。それがあなたスタイル。",prod:"金賞の一膳の赤飯",prodDesc:"ちょっとした「今日も頑張った」の\nご褒美に。自分へのボーナス。",traits:["エネルギッシュ","ポジティブ","自己投資"]},"110":{mbti:"ISTP",name:"コスト最適化マネージャー",sub:"無駄ゼロの実利派エキスパート",emoji:"🎯",desc:"余計なコストは一切かけない。食事に関しても、最小のリソースで最大の栄養効果を出したい。そんなあなたにとって、雑穀パックは「費用対効果が最高の投資」です。シンプルに、確実に。",prod:"金賞健康米×金のいぶき（玄米）",prodDesc:"無駄なし、コスパ最高の\n玄米パック。実利派の最適解。",traits:["コスト意識","実利主義","ミニマリスト"]},"111":{mbti:"INFP",name:"ウェルビーイング投資家",sub:"心と体への丁寧な投資家",emoji:"🌺",desc:"数字より感覚、効率よりもゆとり。「体に良いものを丁寧に」という価値観を持つあなたにとって、質の高い栄養を手軽に摂れることは、理想と現実の橋渡しです。自分を大切にすることへの罪悪感は、もう手放していいんです。",prod:"金賞健康米×十六雑穀",prodDesc:"16種の自然の恵み。丁寧に、\nでも手軽に。それが最高の選択。",traits:["ウェルビーイング","感性重視","自己ケア"]}};
var currentMode=null,answers=[];
function showScreen(id){var s=document.querySelectorAll('.screen');for(var i=0;i<s.length;i++)s[i].classList.remove('active');document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function goTop(){answers=[];showScreen('screen-top');}
function startDiagnose(mode){currentMode=mode;answers=[];renderQuestion(mode,0);showScreen('screen-'+mode);}
function renderQuestion(mode,qIdx){
  var questions=(mode==='cinderella')?cinderellaQ:managerQ;
  var q=questions[qIdx];
  var areaId=(mode==='cinderella')?'c-q-area':'m-q-area';
  var progressId=(mode==='cinderella')?'c-progress':'m-progress';
  var labelId=(mode==='cinderella')?'c-q-label':'m-q-label';
  var pctId=(mode==='cinderella')?'c-q-pct':'m-q-pct';
  var pct=Math.round(((qIdx+1)/questions.length)*100);
  document.getElementById(progressId).style.width=pct+'%';
  document.getElementById(labelId).textContent='Q'+(qIdx+1)+' / '+questions.length;
  document.getElementById(pctId).textContent=pct+'%';
  var area=document.getElementById(areaId);
  var card=document.createElement('div');card.className='q-card';
  var num=document.createElement('div');num.className='q-number';num.textContent='QUESTION '+(qIdx+1);card.appendChild(num);
  var qt=document.createElement('div');qt.className='q-text';qt.innerHTML=q.q.replace(/\n/g,'<br>');card.appendChild(qt);
  var btns=document.createElement('div');btns.className='answer-btns';
  for(var i=0;i<q.a.length;i++){
    (function(idx,choice){
      var btn=document.createElement('button');btn.className='answer-btn';btn.type='button';
      var letter=document.createElement('div');letter.className='answer-letter';letter.textContent=String.fromCharCode(65+choice);btn.appendChild(letter);
      var txt=document.createElement('div');txt.className='answer-text';txt.innerHTML=q.a[choice].replace(/\n/g,'<br>');btn.appendChild(txt);
      btn.addEventListener('click',function(){selectAnswer(mode,idx,choice);});
      btns.appendChild(btn);
    })(qIdx,i);
  }
  card.appendChild(btns);area.innerHTML='';area.appendChild(card);
}
function selectAnswer(mode,qIdx,choice){
  answers.push(choice);
  var questions=(mode==='cinderella')?cinderellaQ:managerQ;
  if(qIdx+1<questions.length){
    var area=document.getElementById((mode==='cinderella')?'c-q-area':'m-q-area');
    area.style.opacity='0';area.style.transform='translateX(-20px)';area.style.transition='opacity 0.25s,transform 0.25s';
    setTimeout(function(){area.style.opacity='1';area.style.transform='translateX(0)';renderQuestion(mode,qIdx+1);},280);
  } else {
    document.getElementById('loading-overlay').classList.add('show');
    setTimeout(function(){document.getElementById('loading-overlay').classList.remove('show');showResult(mode);},1800);
  }
}
function showResult(mode){
  var key=answers.join('');
  var types=(mode==='cinderella')?cinderellaTypes:managerTypes;
  var type=types[key]||types['111'];
  var badge=document.getElementById('r-type-badge');
  badge.textContent=(mode==='cinderella')?'ズボラ・シンデレラ診断':'ご自愛マネジメント診断';
  badge.className='result-badge '+((mode==='cinderella')?'cinderella-badge':'manager-badge');
  document.getElementById('r-mbti-tag').textContent=type.mbti+' タイプ';
  document.getElementById('r-name').textContent=type.name;
  document.getElementById('r-sub').textContent=type.sub;
  document.getElementById('r-emoji').textContent=type.emoji;
  document.getElementById('r-desc').textContent=type.desc;
  document.getElementById('r-prod-title').textContent=type.prod;
  document.getElementById('r-prod-desc').innerHTML=type.prodDesc.replace(/\n/g,'<br>');
  var img=document.getElementById('r-prod-img');
  img.src=productImages[type.prod]||productImages['金賞健康米×金のいぶき（玄米）'];
  img.alt=type.prod;
  var colors=['gold','pink','green'],trailsHtml='';
  for(var i=0;i<type.traits.length;i++)trailsHtml+='<span class="trait-pill '+colors[i%3]+'">'+type.traits[i]+'</span>';
  document.getElementById('r-traits').innerHTML=trailsHtml;
  var url=productUrls[type.prod]||'https://kotokoto-kurashi.com';
  document.getElementById('cta-btn').onclick=function(){window.location.href=url;};
  showScreen('screen-result');
}
window.addEventListener('DOMContentLoaded',function(){
  document.getElementById('btn-cinderella').addEventListener('click',function(){startDiagnose('cinderella');});
  document.getElementById('btn-manager').addEventListener('click',function(){startDiagnose('manager');});
  document.getElementById('c-back').addEventListener('click',goTop);
  document.getElementById('m-back').addEventListener('click',goTop);
  document.getElementById('retry-btn').addEventListener('click',goTop);
  var container=document.getElementById('petal-container');
  var petals=['🌸','🌸','✿','🌷','🌸'];
  for(var i=0;i<12;i++){
    var el=document.createElement('div');el.className='petal';
    el.textContent=petals[Math.floor(Math.random()*petals.length)];
    el.style.cssText='left:'+(Math.random()*100)+'%;top:'+(Math.random()*-30)+'%;font-size:'+(16+Math.random()*18)+'px;animation-duration:'+(8+Math.random()*10)+'s;animation-delay:'+(Math.random()*8)+'s;';
    container.appendChild(el);
  }
});
</script>
